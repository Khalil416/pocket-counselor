<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Counselor - Career Path Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🎯 Pocket Counselor</h1>
            <p class="subtitle">Discover your ideal career path</p>
        </header>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">Question 1 of 5</p>
        </div>

        <!-- Question Container -->
        <div class="question-container" id="questionContainer">
            <!-- Questions will be dynamically inserted here -->
        </div>

        <!-- Result Container (hidden initially) -->
        <div class="result-container" id="resultContainer" style="display: none;">
            <h2>Your Career Recommendations</h2>
            <div id="resultContent"></div>
        </div>

        <!-- Loading Spinner (hidden initially) -->
        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing your answers...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
